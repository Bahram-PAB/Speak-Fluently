name: Android CI/CD Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permissions for Gradle
        run: chmod +x gradlew
        continue-on-error: true # Just in case gradlew is not present initially

      - name: Build Debug APK (For CI validation)
        run: gradle assembleDebug

      - name: Build Release APK
        run: gradle assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore # Fallback debug keystore for automated release builds if needed
          STORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      - name: Build Release App Bundle (AAB)
        run: gradle bundleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
          STORE_PASSWORD: android
          KEY_ALIAS: androiddebugkey
          KEY_PASSWORD: android

      - name: Determine Version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION_NAME=${GITHUB_REF#refs/tags/}
          else
            VERSION_NAME="v1.0.0-build-${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Using version name: ${VERSION_NAME}"

      - name: Copy Release Artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release-unsigned.apk release-artifacts/SpeakFluently-${{ steps.get_version.outputs.VERSION_NAME }}.apk || cp app/build/outputs/apk/release/app-release.apk release-artifacts/SpeakFluently-${{ steps.get_version.outputs.VERSION_NAME }}.apk || cp app/build/outputs/apk/debug/app-debug.apk release-artifacts/SpeakFluently-${{ steps.get_version.outputs.VERSION_NAME }}-debug.apk
          cp app/build/outputs/bundle/release/app-release-unsigned.aab release-artifacts/SpeakFluently-${{ steps.get_version.outputs.VERSION_NAME }}.aab || cp app/build/outputs/bundle/release/app-release.aab release-artifacts/SpeakFluently-${{ steps.get_version.outputs.VERSION_NAME }}.aab || true

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION_NAME }}
          name: Release ${{ steps.get_version.outputs.VERSION_NAME }}
          body: |
            ## Speak Fluently - Release ${{ steps.get_version.outputs.VERSION_NAME }}
            
            Improve your speaking skills with short audio questions, scheduled reminders, multi-language support, and smart offline fallback.
            
            ### What's New
            - Stable build of the audio-package speech-practice interface.
            - Clean Material 3 visual structure with offline playback support.
            - Full localization for Persian (Farsi), English, Indonesian, Thai, Vietnamese, and Malay.
            - WorkManager-based practice reminders with interactive notifications.
            
            ### Assets
            Install the attached APK on your Android device to start practicing!
          draft: false
          prerelease: false
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
